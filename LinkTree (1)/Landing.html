<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Landing · Robótica BSB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #1a1a1a; font-family: "Plus Jakarta Sans", system-ui, sans-serif; }
  #root { min-height: 100vh; }
  *, *::before, *::after { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { font-family: inherit; }

  /* ─────────── DESKTOP ADAPTATIONS ─────────── */
  /* These only apply when the page renders without the iPhone frame
     (the page root carries .desktop-mode class) and viewport is wide. */
  @media (min-width: 900px) {
    .desktop-mode .container-wide { max-width: 1180px; margin-left: auto; margin-right: auto; }
    .desktop-mode .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; row-gap: 28px; align-items: center; padding: 72px 56px 96px !important; max-width: 1180px; margin: 0 auto; }
    .desktop-mode .hero-headline { grid-column: 1 / -1; text-align: center; margin-bottom: 8px !important; }
    .desktop-mode .hero-headline > h2 { font-size: 72px !important; }
    .desktop-mode .hero-pitch { grid-column: 1 / -1; max-width: 760px; margin-left: auto !important; margin-right: auto !important; margin-bottom: 24px !important; font-size: 19px !important; line-height: 1.5 !important; }
    .desktop-mode .hero-stamp-row { grid-column: 1 / -1; margin-bottom: 16px !important; }
    .desktop-mode .hero-video-col { position: static !important; margin-bottom: 0 !important; display: flex; justify-content: center; }
    .desktop-mode .hero-form-col { position: static !important; align-self: center; }
    .desktop-mode .hero-video-col .video-frame { aspect-ratio: 9 / 16 !important; max-width: 320px !important; width: 100% !important; margin: 0 !important; }

    .desktop-mode .schedule { padding: 80px 56px !important; }
    .desktop-mode .schedule-grid { display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 32px; align-items: stretch; min-height: 0 !important; margin-top: 8px; }
    .desktop-mode .schedule-grid .schedule-mobile-card { display: none; }
    .desktop-mode .schedule-grid .schedule-desktop-cards { display: contents !important; }
    .desktop-mode .schedule-grid .sch-card { min-height: 280px; }
    .desktop-mode .schedule-controls { display: none !important; }

    .desktop-mode .evolution { padding: 80px 56px !important; }
    .desktop-mode .evo-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 44px; align-items: start; }
    .desktop-mode .evo-staircase-wrap { min-height: 360px; }
    .desktop-mode .evo-detail { position: sticky; top: 96px; margin-top: 0 !important; }

    .desktop-mode .level-cards-grid { display: grid !important; grid-template-columns: repeat(2, 1fr); gap: 28px; transform: none !important; }
    .desktop-mode .level-cards-grid > div { flex: none !important; padding: 14px !important; }
    .desktop-mode .level-cards-track { transform: none !important; overflow: visible !important; }
    .desktop-mode .level-cards-controls { display: none !important; }

    .desktop-mode .gallery { padding: 80px 56px !important; }
    .desktop-mode .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px; }
    .desktop-mode .gallery-grid .gallery-extra { display: block !important; }
    .desktop-mode .gallery-controls { display: none !important; }

    .desktop-mode .location { padding: 80px 56px !important; }
    .desktop-mode .location-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 40px; align-items: start; }
    .desktop-mode .location-notice { grid-column: 1 / -1; max-width: 720px; margin-left: auto; margin-right: auto; margin-top: 40px !important; }

    .desktop-mode footer { padding: 56px 56px 44px !important; }
    .desktop-mode .footer-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 40px; align-items: center; max-width: 980px; margin: 0 auto; text-align: left; }
    .desktop-mode .footer-grid .foot-col-center { text-align: center; }
    .desktop-mode .footer-grid .foot-col-right { text-align: right; }
    .desktop-mode .footer-divider { display: none; }

    .desktop-mode .topnav { padding: 18px 56px !important; }
    .desktop-mode .topnav-title { font-size: 16px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="landing-sections.jsx"></script>
<script type="text/babel" src="landing-app.jsx"></script>
</body>
</html>
